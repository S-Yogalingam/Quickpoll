<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}QuickPoll — Create polls, share instantly{% endblock %}</title>
    <meta name="description" content="Create polls, share instantly, watch votes roll in." />
    {% block head_extra %}{% endblock %}
    <!-- Bootstrap 5 (CSS only — no JS bundle needed for this app) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="wrap">
      <header class="brand">
        <a href="/" class="d-inline-flex align-items-center gap-2">
          <span class="logo">🗳️</span>
          <h1 class="m-0">QuickPoll</h1>
        </a>
      </header>
      {% block content %}{% endblock %}
      <footer class="footer">
        <a class="link" href="/">← Create a new poll</a>
      </footer>
    </div>
  </body>
</html>
